
server.port=8085
#cors.url=${CORS_URL:https://hms.com/}
spring.application.name=opd-management-services
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Config server
spring.cloud.config.label=main
spring.cloud.config.profile=opd-management-services
#spring.config.import=optional:configserver:https://localhost:8888/config-server

#Discovery# Eureka Client Configuration
#eureka.client.service-url.defaultZone=https://api.hms.com:8443/discovery-0.0.1-SNAPSHOT/eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka-discovery/eureka
eureka.client.region=default
##todo change prefer-ip-address to false and create a hostname for this
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

#Database Configuration
#spring.datasource.url=jdbc:postgresql://localhost:5432/opd_management
#spring.datasource.username=postgres
#spring.datasource.password=Test@123

# Database Configuration with OPD schema - Use environment variables in production
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/myappdb?currentSchema=opd}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Test@123}
# Initialize schema on startup
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA properties with OPD schema
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Explicit OPD schema configuration
spring.jpa.properties.hibernate.default_schema=opd

# Connection pool settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.initialization-fail-timeout=-1

# Graceful shutdown configuration
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
spring.task.execution.shutdown.await-termination=true
spring.task.execution.shutdown.await-termination-period=30s

# PostgreSQL case sensitivity
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# Enhanced logging for schema verification
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.springframework.orm.jpa=DEBUG


