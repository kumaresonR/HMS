server.port=8094
spring.application.name=billing-management-services
#cors.url=${CORS_URL:*}
# Config server
spring.cloud.config.label=main
spring.cloud.config.profile=billing-management-services
#spring.config.import=optional:configserver:https://localhost:8888/config-server

#Discovery# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka-discovery/eureka
eureka.client.region=default
##todo change prefer-ip-address to false and create a hostname for this
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Database Configuration with Billing schema - Use environment variables in production
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/myappdb?currentSchema=billing}
# Initialize schema on startup
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Test@123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.initialization-fail-timeout=-1

# Graceful shutdown configuration
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
spring.task.execution.shutdown.await-termination=true
spring.task.execution.shutdown.await-termination-period=30s
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=task-executor-

# JPA properties with Billing schema
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}

# Explicit Billing schema configuration
spring.jpa.properties.hibernate.default_schema=billing

# Enhanced logging for better debugging
