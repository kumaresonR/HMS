server.port=8098
#cors.url=${CORS_URL:https://hms.com/}
spring.application.name=ot-management-services
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Config server
spring.cloud.config.label=main
spring.cloud.config.profile=ot-management-services
#spring.config.import=optional:configserver:https://localhost:8888/config-server

#Discovery# Eureka Client Configuration
#eureka.client.service-url.defaultZone=https://api.hms.com:8443/discovery-0.0.1-SNAPSHOT/eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka-discovery/eureka
eureka.client.region=default
##todo change prefer-ip-address to false and create a hostname for this
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

