# Physical naming strategy - ensures table/column names match exactly as defined in @Table/@Column
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# Globally quote identifiers - preserves case sensitivity for PostgreSQL (required for uppercase table names)
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Database Configuration - Use environment variables in production
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/myappdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Test@123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Optional JPA settings
# For production, use: spring.profiles.active=prod (which sets ddl-auto=validate)
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Allow Hibernate to continue even if some DDL operations fail (useful during schema migration)
spring.jpa.properties.hibernate.hbm2ddl.halt_on_error=false

# Default schema for your entities
spring.jpa.properties.hibernate.default_schema=admin

# Connection pool settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000

